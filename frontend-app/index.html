<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Lab 06: SOA Integration</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background: #eef2f3; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 350px; margin: auto; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        input, textarea { width: 100%; margin-bottom: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-blue { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
        .btn-green { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .status { margin-top: 15px; font-size: 13px; text-align: center; color: #7f8c8d; font-weight: bold; }
        #profileBox { display: none; }
    </style>
</head>
<body>

    <div id="authBox" class="card">
        <h2>Auth (SOAP)</h2>
        <input id="user" placeholder="Хэрэглэгчийн нэр">
        <input id="pass" type="password" placeholder="Нууц үг">
        <button class="btn-green" onclick="doRegister()">Бүртгүүлэх</button>
        <div style="height: 10px;"></div>
        <button class="btn-blue" onclick="doLogin()">Нэвтрэх</button>
        <div id="authStatus" class="status"></div>
    </div>

    <div id="profileBox" class="card">
        <h2>Profile (REST)</h2>
        <input id="name" placeholder="Нэр">
        <textarea id="bio" placeholder="Өөрийн тухай..." rows="3"></textarea>
        <input id="phone" placeholder="Утасны дугаар">
        <button class="btn-blue" onclick="saveProfile()">Мэдээлэл хадгалах</button>
        <button onclick="logout()" style="width:100%; background:none; border:none; color:red; cursor:pointer; margin-top:10px;">Гарах</button>
        <div id="profileStatus" class="status"></div>
    </div>

    <script>
        let sessionToken = "";
        const SOAP_URL = "http://localhost:8081/ws";
        const REST_URL = "http://localhost:8082/users";

        // 1. SOAP REGISTER
        async function doRegister() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const status = document.getElementById('authStatus');

            const soapEnvelope = `
                <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:auth="http://example.com/auth">
                   <soapenv:Body>
                      <auth:RegisterRequest>
                         <auth:username>${user}</auth:username>
                         <auth:password>${pass}</auth:password>
                      </auth:RegisterRequest>
                   </soapenv:Body>
                </soapenv:Envelope>`;

            try {
                const res = await fetch(SOAP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/xml' },
                    body: soapEnvelope
                });
                const text = await res.text();
                if (text.includes("successfully")) {
                    status.style.color = "green";
                    status.innerText = "Бүртгэл амжилттай! Одоо нэвтэрнэ үү.";
                }
            } catch (err) {
                status.innerText = "Сервис холбогдох боломжгүй!";
            }
        }

        // 2. SOAP LOGIN
        async function doLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const status = document.getElementById('authStatus');

            const soapEnvelope = `
                <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:auth="http://example.com/auth">
                   <soapenv:Body>
                      <auth:LoginRequest>
                         <auth:username>${user}</auth:username>
                         <auth:password>${pass}</auth:password>
                      </auth:LoginRequest>
                   </soapenv:Body>
                </soapenv:Envelope>`;

            try {
                const res = await fetch(SOAP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/xml' },
                    body: soapEnvelope
                });

                const xmlText = await res.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
             // Энэ нь namespace-ээс үл хамааран 'token' нэртэй тагийг хайж олно
                const tokenNode = xmlDoc.getElementsByTagNameNS("*", "token")[0] || xmlDoc.getElementsByTagName("token")[0];
                const token = tokenNode?.textContent || tokenNode?.innerHTML;

                if (token && token !== "AUTH_FAILED") {
                    sessionToken = token;
                    document.getElementById('authBox').style.display = 'none';
                    document.getElementById('profileBox').style.display = 'block';
                } else {
                    status.style.color = "red";
                    status.innerText = "Нэвтрэх нэр эсвэл нууц үг буруу!";
                }
            } catch (err) {
                status.innerText = "Сервис холбогдох боломжгүй!";
            }
        }

        // 3. REST SAVE PROFILE
        async function saveProfile() {
            const status = document.getElementById('profileStatus');
            const data = {
                name: document.getElementById('name').value,
                bio: document.getElementById('bio').value,
                phone: document.getElementById('phone').value
            };

            try {
                const res = await fetch(REST_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': sessionToken 
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    status.style.color = "green";
                    status.innerText = "Профайл амжилттай хадгалагдлаа!";
                } else {
                    status.style.color = "red";
                    status.innerText = "Токен хүчингүй байна!";
                }
            } catch (err) {
                status.innerText = "JSON сервис алдаа заалаа!";
            }
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
